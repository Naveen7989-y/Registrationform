<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
      <table  id="signupform">
        
            <center><h1 id="heading">Registration Form</h1></center>

        <tbody>
            <tr>
                
                <td><label for="firstname">FIRSTNAME</label></td>
                <td><input type="text" placeholder="Enter" id="firstname" name="FIRSTNAMe"></td>
            </tr>
            <tr>
                <td><label for="lastname">LASTNAME</label></td>
                <td><input type="text" placeholder="Enter" id="lastname"></td>
            </tr>
            <tr>
                <td><label for="DOB">DATEOFBIRTH</label></td>
                <td><input type="date" placeholder="Enter" id="dob"></td>
            </tr>
            <tr>
                <td><label for="createpassword">CREATE PASSWORD</label></td>
                <td id="pwbox">
                    <input type="password" placeholder="Enter" id="createpassword">
                    <span id="see"><button id="seebtn">see</button></span>
                </td>
            </tr>
            <tr>
                <td><label for="E-mail">E-MAIL</label></td>
                <td><input type="email" placeholder="Enter" id="email"></td>
            </tr>
            <tr>
                <td><label for="CONTACT NO">CONTACT NO</label></td>
                <td><input type="tel" placeholder="Enter" id="mobile" maxlength="10" size="10"></td>
            </tr>
            <tr>
                <td><center><button id="generate">Generate</button></center></td>
                <td>
                    <input type="text" name="*%PW" id="copypassword">
                </td>
            </tr>
            <tr >
                <td colspan="2">
                    <a href="file:///E:/Registation%20Form/index2.html"><center><button>CREATE ACCOUNT</button></center></a>
                </td>
            </tr>
        </tbody>
      </table>
</body>
<script src="./script.js"></script>
</html>
